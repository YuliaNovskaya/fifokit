<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WA FIFO Jobs | FIFOKIT</title>
  <meta name="description" content="Curated WA FIFO jobs for beginners, entry-level workers, trade assistants, utility workers, drillers offsiders and mining job seekers." />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="jobs-page">
    <section class="jobs-hero">
      <h1>WA FIFO Jobs</h1>
        <p>
        Curated FIFO jobs in Western Australia, with beginner-friendly filters, roster details and ticket guidance.
        </p>

        <div class="jobs-hero-actions">
        <a class="primary-btn" href="index.html">
            Back to FIFOKIT
        </a>
        </div>
    </section>
    
    <section class="jobs-note">
        <p>
            Jobs are curated for WA FIFO applicants. Always check the original job ad before applying, as requirements and closing dates may change.
        </p>
    </section>

    <section class="jobs-controls">

    <input
        type="text"
        id="jobSearch"
        placeholder="Search jobs..."
    />

    <select id="jobCategory">
        <option value="all">All Categories</option>
        <option value="utility">Utility Worker</option>
        <option value="trade-assistant">Trade Assistant</option>
        <option value="drillers-offsider">Driller's Offsider</option>
        <option value="nipper">Underground Nipper</option>
        <option value="site-admin">Site Administrator</option>
    </select>

    <select id="jobExperience">
        <option value="all">All Experience Levels</option>
        <option value="entry">Entry Level</option>
        <option value="experienced">Experienced</option>
    </select>

    </section>

    <section class="jobs-list" id="jobsList">

    </section>
  </main>
<script src="jobs.js"></script>
</body>
</html>
